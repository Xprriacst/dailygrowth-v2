[build]
  # Installation Flutter et build avec gestion du cache
  command = """
    # Step 1: Install Flutter if needed
    if [ ! -d "flutter" ]; then
      echo "📦 Installing Flutter..."
      git clone https://github.com/flutter/flutter.git -b stable
    fi

    # Step 2: Configure Flutter
    export PATH=$PATH:$PWD/flutter/bin
    flutter config --enable-web

    # Step 3: Build Flutter web app
    echo "🔨 Building Flutter web app..."
    flutter build web --release \
      --dart-define=SUPABASE_URL=$SUPABASE_URL \
      --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
      --dart-define=OPENAI_API_KEY=$OPENAI_API_KEY

    # Step 4: Copy critical PWA files that Flutter doesn't copy automatically
    echo "📋 Copying critical PWA files..."
    cp web/sw.js build/web/sw.js
    cp web/firebase-messaging-sw.js build/web/firebase-messaging-sw.js
    cp web/unified-sw.js build/web/unified-sw.js
    cp web/manifest.json build/web/manifest.json
    echo "✅ PWA files copied"

    # Step 5: Verify build output
    echo "📂 Build output:"
    ls -la build/web/

    # Step 6: Set version (try multiple Netlify variables)
    echo "🔍 Checking available version variables..."
    echo "   BUILD_ID=$BUILD_ID"
    echo "   NETLIFY_BUILD_ID=$NETLIFY_BUILD_ID"
    echo "   COMMIT_REF=$COMMIT_REF"
    echo "   CONTEXT=$CONTEXT"

    if [ -n "$BUILD_ID" ]; then
      APP_BUILD_VERSION="$BUILD_ID"
      echo "✅ Using BUILD_ID: $APP_BUILD_VERSION"
    elif [ -n "$NETLIFY_BUILD_ID" ]; then
      APP_BUILD_VERSION="$NETLIFY_BUILD_ID"
      echo "✅ Using NETLIFY_BUILD_ID: $APP_BUILD_VERSION"
    elif [ -n "$COMMIT_REF" ]; then
      APP_BUILD_VERSION="$COMMIT_REF"
      echo "⚠️ Using COMMIT_REF: $APP_BUILD_VERSION"
    else
      APP_BUILD_VERSION=$(date +%s%3N)
      echo "⚠️ Using timestamp (milliseconds): $APP_BUILD_VERSION"
    fi

    # Step 7: Replace placeholders (without creating backup files)
    echo "🔄 Replacing placeholders..."
    sed -i "s|NETLIFY_SUPABASE_URL_PLACEHOLDER|$SUPABASE_URL|g" build/web/index.html
    sed -i "s|NETLIFY_SUPABASE_ANON_KEY_PLACEHOLDER|$SUPABASE_ANON_KEY|g" build/web/index.html
    sed -i "s|NETLIFY_FIREBASE_VAPID_KEY_PLACEHOLDER|$FIREBASE_VAPID_KEY|g" build/web/index.html
    sed -i "s|__APP_BUILD_VERSION__|$APP_BUILD_VERSION|g" build/web/index.html
    sed -i "s|__SW_VERSION__|$APP_BUILD_VERSION|g" build/web/sw.js

    # Step 8: Create env.js file (fix for MIME type error)
    echo "📝 Creating env.js file..."
    echo "// Production env.js (empty - values injected in index.html)" > build/web/env.js
    echo "console.log('[env.js] Environment variables loaded from window.ENV');" >> build/web/env.js

    # Step 9: Verify replacement
    echo "🔍 Verifying version replacement..."
    if grep -q "__APP_BUILD_VERSION__" build/web/index.html; then
      echo "❌ ERROR: Version placeholder was not replaced!"
      exit 1
    else
      echo "✅ Version successfully set to: $APP_BUILD_VERSION"
    fi

    if grep -q "__SW_VERSION__" build/web/sw.js; then
      echo "❌ ERROR: SW version placeholder was not replaced!"
      exit 1
    else
      echo "✅ Service Worker version successfully updated"
    fi

    echo "🎉 Build completed successfully!"
  """
  publish = "build/web"

# IMPORTANT: L'ordre des redirections compte! Netlify applique la première règle qui matche.
# Les règles spécifiques doivent être EN PREMIER, la règle générique /* EN DERNIER.

# Redirections pour les assets statiques
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

[[redirects]]
  from = "/icons/*"
  to = "/icons/:splat"
  status = 200

[[redirects]]
  from = "/sw.js"
  to = "/sw.js"
  status = 200

[[redirects]]
  from = "/main.dart.js"
  to = "/main.dart.js"
  status = 200

[[redirects]]
  from = "/env.js"
  to = "/env.js"
  status = 200

[[redirects]]
  from = "/*.js"
  to = "/:splat.js"
  status = 200

[[redirects]]
  from = "/*.js.map"
  to = "/:splat.js.map"
  status = 200

[[redirects]]
  from = "/*.css"
  to = "/:splat.css"
  status = 200

[[redirects]]
  from = "/*.json"
  to = "/:splat.json"
  status = 200

[[redirects]]
  from = "/*.png"
  to = "/:splat.png"
  status = 200

[[redirects]]
  from = "/*.jpg"
  to = "/:splat.jpg"
  status = 200

[[redirects]]
  from = "/*.svg"
  to = "/:splat.svg"
  status = 200

[[redirects]]
  from = "/*.ico"
  to = "/:splat.ico"
  status = 200

[[redirects]]
  from = "/*.wasm"
  to = "/:splat.wasm"
  status = 200

[[redirects]]
  from = "/manifest.json"
  to = "/manifest.json"
  status = 200

[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.ico"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

